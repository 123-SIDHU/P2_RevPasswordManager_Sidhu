<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | RevSecurity</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
</head>

<body>
    <div class="auth-wrapper" style="background: #f1f5f9;">
        <div class="auth-split-container">
            <!-- Image Side -->
            <div class="auth-image-side">
                <div class="auth-image-text">
                    <h2 style="font-size: 28px; margin-bottom: 12px; font-weight: 800;">Your Security, Our Priority</h2>
                    <p style="opacity: 0.9;">Store your passwords securely and access them from anywhere with
                        military-grade encryption.</p>
                </div>
            </div>

            <!-- Form Side -->
            <div style="flex: 1.2; padding: 40px; background: white;">
                <div class="auth-logo" style="justify-content: flex-start; margin-bottom: 32px;">
                    <div class="logo-icon" style="width: 40px; height: 40px; font-size: 18px;">🔐</div>
                    <span class="logo-text" style="font-size: 18px;">RevSecurity</span>
                </div>
                <h1 class="auth-title" style="text-align: left; margin-bottom: 8px;">Welcome back</h1>
                <p class="auth-subtitle" style="text-align: left; margin-bottom: 32px;">Please sign in to your vault</p>

                <div th:if="${loginError}" class="alert alert-danger">❌ <span th:text="${loginError}"></span></div>
                <div th:if="${logoutMsg}" class="alert alert-success">✅ <span th:text="${logoutMsg}"></span></div>
                <div th:if="${successMsg}" class="alert alert-success">✅ <span th:text="${successMsg}"></span></div>
                <div th:if="${errorMsg}" class="alert alert-danger">❌ <span th:text="${errorMsg}"></span></div>

                <form method="post" th:action="@{/login}" autocomplete="on">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="form-group">
                        <label class="form-label" for="usernameOrEmail">Username or Email</label>
                        <input id="usernameOrEmail" name="usernameOrEmail" type="text" class="form-control"
                            placeholder="Enter username or email" autofocus autocomplete="username" required />
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="masterPassword">Master Password</label>
                        <div class="input-group">
                            <input id="masterPassword" name="masterPassword" type="password" class="form-control"
                                placeholder="Enter master password" autocomplete="current-password" required />
                            <button type="button" class="toggle-pw">👁️</button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-full mt-4"
                        style="justify-content:center; padding: 12px;">
                        🔓 Sign In
                    </button>
                </form>

                <div class="mt-4" style="text-align:center; font-size:13px; color:var(--text-secondary);">
                    <a th:href="@{/recover}" style="color:var(--accent-light); text-decoration:none;">Forgot master
                        password?</a>
                    &nbsp;·&nbsp;
                    <a th:href="@{/register}" style="color:var(--accent-light); text-decoration:none;">Create
                        account</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.querySelectorAll('.toggle-pw').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = btn.previousElementSibling;
                if (input) {
                    input.type = input.type === 'password' ? 'text' : 'password';
                    btn.textContent = input.type === 'password' ? '👁️' : '🙈';
                }
            });
        });
    </script>
</body>

</html>
